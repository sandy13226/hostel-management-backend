spring.application.name=hostel-management

# Azure App Service exposes port 8080 by default for Java Linux apps.
server.port=8080

# H2 file-based DB improves stability over in-memory for cloud restarts,
# but note App Service local storage is ephemeral unless explicitly persisted.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/hosteldb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate/JPA defaults suitable for dev and light cloud usage.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Keep H2 console disabled by default in cloud; can be enabled via env var in dev.
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Actuator endpoints for Azure health monitoring.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Avoid default white-label HTML error page in cloud; prefer standard error handling.
server.error.whitelabel.enabled=false
